function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur, type='square', vol=0.25, delay=0) {
  if (muted || !freq) return;
  try {
    const ac = getAC();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    gain.gain.setValueAtTime(vol, ac.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + delay + dur);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + dur + 0.01);
  } catch(e){}
}

const LEVEL_CFG = [
  { enemies:1, spd:2.0, gSpd:1.2, chase:0.40, label:'BLOCK 1', sub:'Learn to Stack!' },

// ─── PARSE MAZE ───────────────────────────────────────────────────────────────
function tileCenter(t) { return t * TILE + TILE / 2; }
function tileAt(r,c) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return T.WALL;
  return grid[r][c];
}
function snapGrid(coord) {
  // Nearest tile center
  return Math.round((coord - TILE/2) / TILE) * TILE + TILE/2;
}

function parseMaze(rows) {
  const g = [], players = [], ghosts = [];
  let coins = 0;
  for (let r=0; r<ROWS; r++) {
    const row = [];
    // Pad/trim to exactly COLS
    const s = (rows[r]||'').padEnd(COLS,' ').slice(0,COLS);
    for (let c=0; c<COLS; c++) {
      const ch = s[c];
      if      (ch==='W') row.push(T.WALL);
      else if (ch==='.') { row.push(T.COIN);  coins++; }
      else if (ch==='O') { row.push(T.POWER); coins++; }
      else if (ch==='P') { row.push(T.EMPTY); players.push({x:tileCenter(c),y:tileCenter(r)}); }
      else if (ch==='G') { row.push(T.EMPTY); ghosts.push({x:tileCenter(c),y:tileCenter(r)}); }
      else               row.push(T.EMPTY);
    }
    g.push(row);
  }
  const pStart = players[0] || {x:tileCenter(10),y:tileCenter(18)};
  if (!ghosts.length) ghosts.push({x:tileCenter(10),y:tileCenter(9)});
  return {grid:g, pStart, ghostStarts:ghosts, totalCoins:coins};
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────

// ─── PLAYER ───────────────────────────────────────────────────────────────────
const imgP = new Image(); imgP.src='assets/satoshi.png';

function mkPlayer(pos,cfg) {
  return {x:pos.x,y:pos.y,dx:0,dy:0,ndx:0,ndy:0,speed:cfg.spd,
          anim:0,mouth:true,facing:0};
}

function canMoveTo(px,py) {
  const m = TILE*0.36;
  for (const [cx,cy] of [[px-m,py-m],[px+m,py-m],[px-m,py+m],[px+m,py+m]]) {
    if (tileAt(Math.floor(cy/TILE), Math.floor(cx/TILE))===T.WALL) return false;
  }
  return true;
}

function tryMove(dx,dy) {
  const spd = player.speed;
  const SNAP = spd + 2.5;
  if (dx!==0) {
    const sy = snapGrid(player.y);
    if (Math.abs(player.y-sy)<=SNAP) {
      const nx = player.x + dx*spd;
      if (canMoveTo(nx,sy)) { player.x=nx; player.y=sy; return true; }
    }
  }
  if (dy!==0) {
    const sx = snapGrid(player.x);
    if (Math.abs(player.x-sx)<=SNAP) {
      const ny = player.y + dy*spd;
      if (canMoveTo(sx,ny)) { player.x=sx; player.y=ny; return true; }
    }
  }
  return false;
}

function updatePlayer() {
  // Accumulate input from keys or D-pad
  if      (keys.l) { player.ndx=-1; player.ndy=0; }
  else if (keys.r) { player.ndx= 1; player.ndy=0; }
  else if (keys.u) { player.ndx=0;  player.ndy=-1; }
  else if (keys.d) { player.ndx=0;  player.ndy= 1; }

  // Try queued direction, then current
  let moved = false;
  if (player.ndx||player.ndy) {
    moved = tryMove(player.ndx,player.ndy);
    if (moved) { player.dx=player.ndx; player.dy=player.ndy; }
  }
  if (!moved) tryMove(player.dx,player.dy);

  // Facing
  if      (player.dx>0) player.facing=0;
  else if (player.dy>0) player.facing=1;
  else if (player.dx<0) player.facing=2;
  else if (player.dy<0) player.facing=3;

  // Wrap
  if (player.x < -TILE)   player.x = W+TILE;
  if (player.x > W+TILE)  player.x = -TILE;

  player.anim++;
  if (player.anim%5===0) player.mouth=!player.mouth;
}

// ─── GHOST AI ─────────────────────────────────────────────────────────────────
const GCOLS = ['#FF6666','#FF9900','#00FDDC','#FFBF00'];

function mkGhost(pos,idx,cfg) {
  return {x:pos.x,y:pos.y,dx:1,dy:0,speed:cfg.gSpd,color:GCOLS[idx%4],
          scared:false,flash:false,dead:false,lastKey:'',anim:0};
}

function chooseGhostDir(g,tc,tr) {
  const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
  // No reverse
  const noRev = dirs.filter(d=>!(d.dx===-g.dx&&d.dy===-g.dy));
  const valid = noRev.filter(d=>tileAt(tr+d.dy,tc+d.dx)!==T.WALL);
  const pool  = valid.length ? valid : dirs.filter(d=>tileAt(tr+d.dy,tc+d.dx)!==T.WALL);
  if (!pool.length) return;

  const cfg = LEVEL_CFG[lvl];
  let chosen;
  if (g.scared) {
    // Flee: maximize distance
    chosen = pool.reduce((best,d)=>{
      const db = Math.hypot(tileCenter(tc+best.dx)-player.x, tileCenter(tr+best.dy)-player.y);
      const dd = Math.hypot(tileCenter(tc+d.dx)-player.x,    tileCenter(tr+d.dy)-player.y);
      return dd>db ? d : best;
    });
  } else if (Math.random()<cfg.chase) {
    // Chase: minimize distance
    chosen = pool.reduce((best,d)=>{
      const db = Math.hypot(tileCenter(tc+best.dx)-player.x, tileCenter(tr+best.dy)-player.y);
      const dd = Math.hypot(tileCenter(tc+d.dx)-player.x,    tileCenter(tr+d.dy)-player.y);
      return dd<db ? d : best;
    });
  } else {
    chosen = pool[Math.floor(Math.random()*pool.length)];
  }
  g.dx=chosen.dx; g.dy=chosen.dy;
}

function updateGhost(g) {
  if (g.dead) return;
  const spd = g.scared ? g.speed*0.5 : g.speed;

  const tc = Math.round((g.x-TILE/2)/TILE);
  const tr = Math.round((g.y-TILE/2)/TILE);
  const cx = tileCenter(tc), cy = tileCenter(tr);
  const key = tc+','+tr;

  // At tile center: decide direction (only once per center)
  if (Math.abs(g.x-cx)<spd+0.6 && Math.abs(g.y-cy)<spd+0.6 && key!==g.lastKey) {
    g.x=cx; g.y=cy;
    g.lastKey=key;
    chooseGhostDir(g,tc,tr);
  }

  // Check if about to hit wall, if so stop and wait for next center
  const nx=g.x+g.dx*spd, ny=g.y+g.dy*spd;
  if (canMoveTo(nx,ny)) { g.x=nx; g.y=ny; }

  // Wrap
  if (g.x < -TILE) g.x=W+TILE;
  if (g.x > W+TILE) g.x=-TILE;

  g.anim++;
}

// ─── COINS & COLLISIONS ───────────────────────────────────────────────────────
let lastCoinTile = -1;
function eatCoins() {
  const tc=Math.floor(player.x/TILE), tr=Math.floor(player.y/TILE);
  const m=TILE*0.42;
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const r=tr+dr, c=tc+dc;
    if (r<0||r>=ROWS||c<0||c>=COLS) continue;
    const cx=tileCenter(c), cy=tileCenter(r);
    if (Math.abs(player.x-cx)<m && Math.abs(player.y-cy)<m) {
      if (grid[r][c]===T.COIN) {
        grid[r][c]=T.EMPTY; score+=10; coinsLeft--;
        SFX.coin(); updateUI();
      } else if (grid[r][c]===T.POWER) {
        grid[r][c]=T.EMPTY; score+=50; coinsLeft--;
        powerTimer=300;
        ghosts.forEach(g=>{ if(!g.dead){g.scared=true;g.flash=false;g.lastKey='';} });
        SFX.power(); updateUI();
      }
    }
  }
}

function checkCollisions() {
  for (const g of ghosts) {
    if (g.dead) continue;
    if (Math.hypot(player.x-g.x,player.y-g.y)<TILE*0.72) {
      if (g.scared) {
        g.dead=true; score+=200; SFX.eatGhost(); updateUI();
      } else {
        doDie(); return;
      }
    }
  }
}

function doDie() {
  lives--; updateUI();
  if (score>hiScore) { hiScore=score; localStorage.setItem('sha_hi',hiScore); }
  SFX.death(); state='died'; dieTimer=80;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initLevel() {
  const data = parseMaze(LEVELS[lvl]);
  grid=data.grid; pStart=data.pStart; ghostStarts=data.ghostStarts;
  totalCoins=data.totalCoins; coinsLeft=totalCoins;

  const cfg=LEVEL_CFG[lvl];
  player=mkPlayer(pStart,cfg);
  const n=Math.min(cfg.enemies,ghostStarts.length);
  ghosts=[];
  for (let i=0;i<n;i++) ghosts.push(mkGhost(ghostStarts[i]||ghostStarts[0],i,cfg));
  powerTimer=0; updateUI();
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  score=0; lives=3; lvl=0;
  initLevel();
  showBanner(()=>{ state='playing'; if(!muted)startMusic(); });
}

function showBanner(cb) {
  state='levelStart';
  const cfg=LEVEL_CFG[lvl];
  document.getElementById('lbText').textContent=cfg.label;
  document.getElementById('lbSub').textContent=cfg.sub;
  document.getElementById('levelBanner').style.display='flex';
  setTimeout(()=>{ document.getElementById('levelBanner').style.display='none'; if(cb)cb(); },2000);
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('levelDisplay').textContent=lvl+1;
  document.getElementById('hiDisplay').textContent=hiScore;
  const el=document.getElementById('lives-display');
  el.innerHTML='';
  for (let i=0;i<lives;i++) {
    const img=document.createElement('img');
    img.src='assets/satoshi.png';
    img.style.cssText='height:20px;width:20px;object-fit:contain;filter:drop-shadow(0 0 2px #00FDDC)';
    el.appendChild(img);
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys={l:false,r:false,u:false,d:false};
document.addEventListener('keydown',e=>{
  if(state==='title'){startGame();return;}
  if(state==='gameOver'||state==='win'){initTitle();return;}
  if(e.key==='Escape'){ state=state==='playing'?'paused':'playing'; return; }
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keys.l=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.r=true;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W') keys.u=true;
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S') keys.d=true;
  e.preventDefault && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key) && e.preventDefault();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keys.l=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.r=false;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W') keys.u=false;
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S') keys.d=false;
});

// D-Pad buttons
function setupDpad() {
  const map={
    'btn-up':   ()=>{keys.u=true;keys.d=false;keys.l=false;keys.r=false;},
    'btn-down': ()=>{keys.d=true;keys.u=false;keys.l=false;keys.r=false;},
    'btn-left': ()=>{keys.l=true;keys.r=false;keys.u=false;keys.d=false;},
    'btn-right':()=>{keys.r=true;keys.l=false;keys.u=false;keys.d=false;},
  };
  const rel=()=>{keys.l=keys.r=keys.u=keys.d=false;};
  Object.entries(map).forEach(([id,fn])=>{
    const btn=document.getElementById(id);
    const start=e=>{ e.preventDefault(); getAC(); // resume AudioContext on touch
      if(state==='title'){startGame();return;}
      if(state==='gameOver'||state==='win'){initTitle();return;}
      fn(); btn.classList.add('pressed');
    };
    const end=e=>{ e.preventDefault(); rel(); btn.classList.remove('pressed'); };
    btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',  end,  {passive:false});
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup',   end);
  });
}

// Swipe on canvas
let swipeX=0,swipeY=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); getAC();
  swipeX=e.touches[0].clientX; swipeY=e.touches[0].clientY;
  if(state==='title'){startGame();return;}
  if(state==='gameOver'||state==='win'){initTitle();}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) return;
  keys.l=keys.r=keys.u=keys.d=false;
  if(Math.abs(dx)>Math.abs(dy)) { if(dx>0)keys.r=true; else keys.l=true; }
  else                          { if(dy>0)keys.d=true; else keys.u=true; }
  setTimeout(()=>{keys.l=keys.r=keys.u=keys.d=false;},200);
},{passive:false});

document.getElementById('startBtn').addEventListener('click',()=>{ getAC(); startGame(); });

// ─── DRAWING ──────────────────────────────────────────────────────────────────
function drawMaze() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const x=c*TILE, y=r*TILE, t=grid[r][c];
    if (t===T.WALL) {
      ctx.fillStyle='#071a4a';
      ctx.fillRect(x,y,TILE,TILE);
      // Neon edge lines on sides facing open space
      ctx.strokeStyle='#00FDDC'; ctx.lineWidth=1.5;
      ctx.beginPath();
      if(tileAt(r-1,c)!==T.WALL){ctx.moveTo(x,y+1);     ctx.lineTo(x+TILE,y+1);}
      if(tileAt(r+1,c)!==T.WALL){ctx.moveTo(x,y+TILE-1);ctx.lineTo(x+TILE,y+TILE-1);}
      if(tileAt(r,c-1)!==T.WALL){ctx.moveTo(x+1,y);     ctx.lineTo(x+1,y+TILE);}
      if(tileAt(r,c+1)!==T.WALL){ctx.moveTo(x+TILE-1,y);ctx.lineTo(x+TILE-1,y+TILE);}
      ctx.stroke();
    } else {
      ctx.fillStyle='#040e2a'; ctx.fillRect(x,y,TILE,TILE);
      if (t===T.COIN) drawCoin(x+TILE/2,y+TILE/2,4,false);
      else if (t===T.POWER) drawCoin(x+TILE/2,y+TILE/2,8*(0.8+0.2*Math.sin(Date.now()/180)),true);
    }
  }
}

function drawCoin(cx,cy,r,isPower) {
  if (isPower) {
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.2);
    g.addColorStop(0,'rgba(255,153,0,.55)'); g.addColorStop(1,'rgba(255,153,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r*2.2,0,Math.PI*2); ctx.fill();
  }
  const g=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
  g.addColorStop(0,'#FFE566'); g.addColorStop(.6,'#FFBF00'); g.addColorStop(1,'#CC8800');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isPower?'#7a4000':'#5a3000';
  ctx.font=`bold ${Math.max(5,r*1.1)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('₿',cx,cy+r*.05);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(player.facing*Math.PI/2);
  const s=TILE*1.45;
  if(imgP.complete&&imgP.naturalWidth) ctx.drawImage(imgP,-s/2,-s/2,s,s);
  else { ctx.fillStyle='#7066EE'; ctx.beginPath(); ctx.arc(0,0,TILE*.5,0,Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function drawGhosts() {
  for (const g of ghosts) {
    if (g.dead) continue;
    ctx.save();
    ctx.translate(g.x,g.y);
    const s=TILE*1.3;
    const flash=g.flash && Math.floor(Date.now()/200)%2===0;
    if (g.scared) {
      ctx.globalAlpha=flash?0.45:0.9;
      ctx.filter='hue-rotate(160deg) saturate(3) brightness(1.1)';
    }
    if(imgE.complete&&imgE.naturalWidth) ctx.drawImage(imgE,-s/2,-s/2,s,s);
    else { ctx.fillStyle=g.scared?'#0E79B2':g.color; ctx.beginPath(); ctx.arc(0,0,TILE*.5,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime=0, lvCompleteTimer=0;
function loop(ts) {
  requestAnimationFrame(loop);
  ctx.fillStyle='#040e2a'; ctx.fillRect(0,0,W,H);

  if (state==='title') { drawMaze(); return; }

  // Power timer
  if (powerTimer>0) {
    powerTimer--;
    if (powerTimer<100) ghosts.forEach(g=>{ if(g.scared)g.flash=true; });
    if (powerTimer===0) ghosts.forEach(g=>{ g.scared=false; g.flash=false; });
  }

  if (state==='playing') {
    updatePlayer(); ghosts.forEach(updateGhost); eatCoins(); checkCollisions();
    if (coinsLeft<=0) {
      score+=500+(lvl+1)*100;
      if(score>hiScore){hiScore=score;localStorage.setItem('sha_hi',hiScore);}
      updateUI(); stopMusic();
      if (lvl>=LEVELS.length-1) { SFX.gameWin(); state='win'; }
      else { SFX.levelWin(); state='lvlDone'; lvCompleteTimer=90; }
    }
  }

  if (state==='lvlDone') {
    lvCompleteTimer--;
    if (lvCompleteTimer<=0) {
      lvl++; initLevel();
      showBanner(()=>{ state='playing'; if(!muted)startMusic(); });
    }
  }

  if (state==='died') {
    dieTimer--;
    if (dieTimer<=0) {
      if (lives<=0) { stopMusic(); state='gameOver'; }
      else {
        // Respawn
        player.x=pStart.x; player.y=pStart.y; player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
        ghosts.forEach((g,i)=>{
          const gp=ghostStarts[i]||ghostStarts[0];
          g.x=gp.x; g.y=gp.y; g.dx=1; g.dy=0; g.scared=false; g.flash=false; g.dead=false; g.lastKey='';
        });
        powerTimer=0;
        state='playing';
      }
    }
  }

  // Draw
  drawMaze(); drawGhosts();
  if (state!=='gameOver'&&state!=='win') drawPlayer();

  // Level complete flash
  if (state==='lvlDone') {
    ctx.fillStyle=`rgba(0,253,220,${0.25*Math.abs(Math.sin(lvCompleteTimer*.12))})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFBF00'; ctx.font='bold 30px Arial Black'; ctx.textAlign='center';
    ctx.fillText('BLOCK MINED!  +' + (500+(lvl+1)*100), W/2, H/2);
  }

  if (state==='paused')   drawPause();
  if (state==='gameOver') drawGameOver();
  if (state==='win')      drawWin();
}

function drawPause() {
  ctx.fillStyle='rgba(10,36,99,.82)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFBF00'; ctx.font='bold 36px Arial Black'; ctx.textAlign='center';
  ctx.fillText('PAUSED',W/2,H/2-18);
  ctx.font='15px Arial'; ctx.fillStyle='#00FDDC';
  ctx.fillText('Press ESC to resume',W/2,H/2+22);
}

function drawGameOver() {
  ctx.fillStyle='rgba(10,36,99,.94)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FF6666'; ctx.font='bold 50px Arial Black'; ctx.textAlign='center';
  ctx.fillText('REKT!',W/2,H/2-65);
  ctx.fillStyle='#FFBF00'; ctx.font='bold 24px Arial';
  ctx.fillText('Score: '+score,W/2,H/2-15);
  if (score>=hiScore&&score>0) {
    ctx.fillStyle='#00FDDC'; ctx.font='bold 18px Arial';
    ctx.fillText('NEW HIGH SCORE!',W/2,H/2+22);
  }
  ctx.fillStyle='#8899cc'; ctx.font='15px Arial';
  ctx.fillText('Tap or press any key to try again',W/2,H/2+65);
}

function drawWin() {
  ctx.fillStyle='rgba(10,36,99,.94)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFBF00'; ctx.font='bold 38px Arial Black'; ctx.textAlign='center';
  ctx.fillText('ALL BLOCKS MINED!',W/2,H/2-70);
  ctx.fillStyle='#00FDDC'; ctx.font='bold 20px Arial';
  ctx.fillText('Satoshi wins! 🎉',W/2,H/2-25);
  ctx.fillStyle='#FF6666'; ctx.font='bold 26px Arial';
  ctx.fillText('Final Score: '+score,W/2,H/2+20);
  if (score>=hiScore) {
    ctx.fillStyle='#FFBF00'; ctx.font='bold 18px Arial';
    ctx.fillText('NEW HIGH SCORE!',W/2,H/2+58);
  }
  ctx.fillStyle='#8899cc'; ctx.font='15px Arial';
  ctx.fillText('Tap or press any key to play again',W/2,H/2+95);
}

function initTitle() {
  stopMusic(); state='title';
  document.getElementById('overlay').style.display='flex';
}

// ─── MOBILE SCALE ─────────────────────────────────────────────────────────────
function scaleGame() {
  const wrap = document.getElementById('scaleWrap');
  const gameH = 532 + (isMobile() ? 200 : 0); // canvas + uiBar + dpad
  const sx = window.innerWidth  / 504;
  const sy = window.innerHeight / gameH;
  const s  = Math.min(1, sx, sy);
  wrap.style.transform = `scale(${s})`;
  wrap.style.width  = '504px';
  wrap.style.marginTop = s < 1 ? '0' : '0';
}
function isMobile() { return 'ontouchstart' in window || window.innerWidth < 600; }
window.addEventListener('resize', scaleGame);

// ─── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  const data=parseMaze(LEVELS[0]); grid=data.grid;
  hiScore=+(localStorage.getItem('sha_hi')||0);
  updateUI();
  if (isMobile()) document.getElementById('dpad').style.display='flex';
  setupDpad();
  scaleGame();
  requestAnimationFrame(loop);
});
</script>
