<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>SHAmory: Satoshi's Chase</title>
  <style>
    body{margin:0;background:#0A2463;font-family:Arial,Helvetica,sans-serif;color:#fff}
    #game-wrap{width:504px;margin:20px auto}
    #uiBar{width:504px;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#071a4a;border-radius:12px 12px 0 0;border:2px solid #00FDDC;border-bottom:none}
    #titleOverlay{position:relative;margin-top:-480px;text-align:center}
    #titleOverlay .box{width:504px;height:480px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,36,99,.94);border-radius:0 0 12px 12px}
    #startBtn{padding:12px 24px;background:#FF6666;border:none;color:#fff;font-weight:900;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
  <div id="game-wrap">
    <div id="uiBar">
      <div class="logo">SHAmory <span style="color:#00FDDC;font-size:12px">MAZE</span></div>
      <div id="hud">Score: <span id="ph-score">0</span> &nbsp; Level: <span id="ph-level">1</span></div>
      <button id="ph-mute">Mute</button>
    </div>

    <div id="phaser-game" style="width:504px;height:480px;"></div>

    <div id="titleOverlay">
      <div class="box">
        <h1 style="color:#FF6666;margin:0;font-size:34px">SHAmory<br>Satoshi's Chase</h1>
        <p style="color:#FFBF00">Phaser 3 build — level / maze wired</p>
        <button id="startBtn">STACK SATS!</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    // TILE/LEVEL constants
    const TILE = 24, COLS = 21, ROWS = 20, W = 504, H = 480;

    // Level 1 (full); additional levels will be added later
    const LEVELS = [
      [
        'WWWWWWWWWWWWWWWWWWWWW',
        'W.........W.........W',
        'W.WWW.WWW.W.WWW.WWW.W',
        'WO.W..WWW.W.WWW..W.OW',
        'W.WWW.WWW.W.WWW.WWW.W',
        'W...................W',
        'W.WWW.WW.WWW.WW.WWW.W',
        'W.....W.........W...W',
        'WWWWW.W. G   .W.WWWWW',
        'W.....W.......W.....W',
        'W.....W.WWWWW.W.....W',
        'W.WWW.WW.WWW.WW.WWW.W',
        'W...................W',
        'W.WWW.WWW.W.WWW.WWW.W',
        'WO.W..WWW.W.WWW..W.OW',
        'W.WWW.WWW.W.WWW.WWW.W',
        'W.........W.........W',
        'WWW.WWW.WWWWW.WWW.WWW',
        'W.........P.........W',
        'WWWWWWWWWWWWWWWWWWWWW',
      ]
    ];

    function parseMaze(rows) {
      const grid=[]; let players=[], ghosts=[], coins=0;
      for(let r=0;r<ROWS;r++){
        const row=[]; const s=(rows[r]||'').padEnd(COLS,' ').slice(0,COLS);
        for(let c=0;c<COLS;c++){
          const ch=s[c];
          if(ch==='W'){ row.push('W'); }
          else if(ch==='.'){ row.push('.'); coins++; }
          else if(ch==='O'){ row.push('O'); coins++; }
          else if(ch==='P'){ row.push(' '); players.push({x:c,y:r}); }
          else if(ch==='G'){ row.push(' '); ghosts.push({x:c,y:r}); }
          else { row.push(' '); }
        }
        grid.push(row);
      }
      const pStart = players[0]||{x:10,y:18}; if(!ghosts.length) ghosts.push({x:10,y:9});
      return {grid,pStart,ghostStarts:ghosts,totalCoins:coins};
    }

    class BootScene extends Phaser.Scene { constructor(){ super('BootScene'); } preload(){} create(){ this.scene.start('PreloadScene'); } }
    class PreloadScene extends Phaser.Scene {
      constructor(){ super('PreloadScene'); }
      preload(){
        const w=this.cameras.main.width, h=this.cameras.main.height;
        const bar = this.add.graphics();
        this.load.on('progress', p=>{ bar.clear(); bar.fillStyle(0x00FDDC,1); bar.fillRect(32,h/2-8,(w-64)*p,16); });
        this.load.image('satoshi','assets/satoshi.png');
        this.load.image('enemy','assets/enemy.png');

        const g = this.make.graphics({x:0,y:0,add:false});
        g.fillStyle(0xFFBF00,1); g.fillCircle(12,12,8);
        g.fillStyle(0xFFE566,0.6); g.fillCircle(9,9,3);
        g.generateTexture('coin',24,24); g.clear();

        g.fillStyle(0x071a4a,1); g.fillRect(0,0,24,24); g.lineStyle(2,0x00FDDC,1); g.strokeRect(2,2,20,20);
        g.generateTexture('wall',24,24); g.destroy();
      }
      create(){ this.scene.start('TitleScene'); }
    }

    class TitleScene extends Phaser.Scene {
      constructor(){ super('TitleScene'); }
      create(){
        console.log('[TitleScene] create');
        const overlay = document.getElementById('titleOverlay');
        const startBtn = document.getElementById('startBtn');
        if (!startBtn) { console.error('[TitleScene] startBtn not found'); return; }
        const startGame = () => {
          console.log('[TitleScene] startGame called');
          if (overlay) overlay.style.display = 'none';
          try { this.scene.start('GameScene'); }
          catch (e) { console.error('[TitleScene] scene.start failed', e); }
        };
        // Remove previous handlers to avoid duplicates
        startBtn.removeEventListener('click', startGame);
        startBtn.addEventListener('click', startGame);
        this.input.once('pointerdown', startGame);
        if (this.input && this.input.keyboard) this.input.keyboard.on('keydown-ENTER', startGame);
      }
    }

    class GameScene extends Phaser.Scene {
      constructor(){ super('GameScene'); }
      create(){
        console.log('[GameScene] create');
        this.cameras.main.setBackgroundColor('#040e2a');
        const levelRows = LEVELS[0];
        const parsed = parseMaze(levelRows);
        this.grid = parsed.grid; this.pStart = parsed.pStart; this.ghostStarts = parsed.ghostStarts;

        // Use Arcade Physics static group for immovable wall tiles
        this.walls = this.physics.add.staticGroup();
        this.coins = this.add.group();
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const ch = this.grid[r][c];
            const x = c * TILE + TILE / 2, y = r * TILE + TILE / 2;
            if (ch === 'W') {
              const w = this.walls.create(x, y, 'wall');
              w.setOrigin(0.5, 0.5);
              w.setDisplaySize(TILE, TILE);
              if (w.body && w.body.setSize) w.body.setSize(TILE, TILE);
              if (w.body && w.body.updateFromGameObject) w.body.updateFromGameObject();
            } else if (ch === '.') {
              const coin = this.add.image(x, y, 'coin');
              coin.setDisplaySize(Math.round(TILE * 0.5), Math.round(TILE * 0.5));
              coin.setOrigin(0.5, 0.5);
              coin.setData('r', r); coin.setData('c', c);
              coin.setDepth(1);
              this.coins.add(coin);
            } else if (ch === 'O') {
              const p = this.add.image(x, y, 'coin');
              p.setDisplaySize(Math.round(TILE * 0.9), Math.round(TILE * 0.9));
              p.setTint(0xFFDD88);
              p.setOrigin(0.5, 0.5);
              p.setData('power', true);
              p.setDepth(1);
              this.coins.add(p);
            }
          }
        }

        // Player and ghosts: size to fit tile (use Image to avoid sprite-frame issues)
        this.player = this.add.image(this.pStart.x * TILE + TILE / 2, this.pStart.y * TILE + TILE / 2, 'satoshi');
        this.player.setOrigin(0.5, 0.5);
        this.player.setDisplaySize(Math.round(TILE * 1.2), Math.round(TILE * 1.2));
        // movement state
        this.playerState = { x:this.player.x, y:this.player.y, dx:0, dy:0, ndx:0, ndy:0, speed: 2.2 };
        this.cursors = this.input.keyboard.createCursorKeys();

        this.ghosts = [];
        for (const gs of this.ghostStarts) {
          const g = this.add.image(gs.x * TILE + TILE / 2, gs.y * TILE + TILE / 2, 'enemy');
          g.setOrigin(0.5, 0.5);
          g.setDisplaySize(Math.round(TILE * 1.0), Math.round(TILE * 1.0));
          this.ghosts.push(g);
        }

        document.getElementById('ph-score').textContent='0'; document.getElementById('ph-level').textContent='1';
      }

      // Helper: get tile char at row/col (treat out-of-bounds as wall)
      tileAt(tr,tc) {
        if (tr<0||tr>=ROWS||tc<0||tc>=COLS) return 'W';
        return this.grid[tr][tc];
      }

      snapGrid(coord) {
        return Math.round((coord - TILE/2) / TILE) * TILE + TILE/2;
      }

      canMoveTo(px,py) {
        const m = TILE * 0.36;
        const corners = [[px-m,py-m],[px+m,py-m],[px-m,py+m],[px+m,py+m]];
        for (const [cx,cy] of corners) {
          const tc = Math.floor(cx / TILE), tr = Math.floor(cy / TILE);
          if (this.tileAt(tr,tc) === 'W') return false;
        }
        return true;
      }

      tryMove(dx,dy) {
        const spd = this.playerState.speed;
        const SNAP = spd + 2.5;
        if (dx!==0) {
          const sy = this.snapGrid(this.player.y);
          if (Math.abs(this.player.y - sy) <= SNAP) {
            const nx = this.player.x + dx * spd;
            if (this.canMoveTo(nx, sy)) { this.player.x = nx; this.player.y = sy; return true; }
          }
        }
        if (dy!==0) {
          const sx = this.snapGrid(this.player.x);
          if (Math.abs(this.player.x - sx) <= SNAP) {
            const ny = this.player.y + dy * spd;
            if (this.canMoveTo(sx, ny)) { this.player.x = sx; this.player.y = ny; return true; }
          }
        }
        return false;
      }

      update() {
        if (!this.playerState) return;
        // Read input
        if (this.cursors.left.isDown) { this.playerState.ndx = -1; this.playerState.ndy = 0; }
        else if (this.cursors.right.isDown) { this.playerState.ndx = 1; this.playerState.ndy = 0; }
        else if (this.cursors.up.isDown) { this.playerState.ndx = 0; this.playerState.ndy = -1; }
        else if (this.cursors.down.isDown) { this.playerState.ndx = 0; this.playerState.ndy = 1; }

        let moved = false;
        if (this.playerState.ndx !== 0 || this.playerState.ndy !== 0) {
          moved = this.tryMove(this.playerState.ndx, this.playerState.ndy);
          if (moved) { this.playerState.dx = this.playerState.ndx; this.playerState.dy = this.playerState.ndy; }
        }
        if (!moved) this.tryMove(this.playerState.dx, this.playerState.dy);

        // Wrap tunnels horizontally
        if (this.player.x < -TILE) this.player.x = W + TILE;
        if (this.player.x > W + TILE) this.player.x = -TILE;

        // After movement, check for coins at player's tile
        this.collectCoinsAtPlayer();
      }

      collectCoinsAtPlayer() {
        const tc = Math.floor(this.player.x / TILE);
        const tr = Math.floor(this.player.y / TILE);
        // find coins that match tile
        const children = this.coins.getChildren ? this.coins.getChildren() : this.coins.getChildren();
        for (let i = children.length - 1; i >= 0; i--) {
          const coin = children[i];
          const r = coin.getData('r'), c = coin.getData('c');
          if (r === tr && c === tc) {
            // remove coin
            coin.destroy();
            this.grid[tr][tc] = ' ';
            // increment score
            this.score = (this.score || 0) + (coin.getData('power') ? 50 : 10);
            document.getElementById('ph-score').textContent = this.score;
          }
        }
      }
    }

    // Initialize Phaser game — ensure Phaser is loaded and set explicit render type
    if (typeof Phaser === 'undefined') {
      console.error('Phaser is not loaded. Check CDN script tag.');
    } else {
      console.log('Phaser version', Phaser.VERSION, 'AUTO constant', Phaser.AUTO);
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: 'phaser-game',
        backgroundColor: '#040e2a',
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: [ BootScene, PreloadScene, TitleScene, GameScene ],
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_HORIZONTALLY }
      };
      try {
        window.game = new Phaser.Game(config);
        console.log('Phaser game created with type', config.type, 'parent=', config.parent);
      } catch (e) {
        console.error('Failed to create Phaser.Game', e);
      }
    }
    document.getElementById('ph-mute').addEventListener('click', ()=>{ console.log('mute toggle — implement audio later'); });
  </script>
</body>
</html>
